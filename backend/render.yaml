services:
  - type: web
    name: quant-backend
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: bash start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: quant-postgres
          property: connectionString
      - key: CORS_ORIGINS
        value: https://qs-front-psi.vercel.app,https://qsscreen.vercel.app,http://localhost:3000,http://localhost:5173
      - key: WEB_CONCURRENCY
        value: 2

databases:
  - name: quant-postgres
    plan: free
    databaseName: quantdb
    user: quant_user
