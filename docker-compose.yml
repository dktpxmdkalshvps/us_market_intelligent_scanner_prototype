version: "3.9"

services:
  # ── FastAPI 백엔드 ───────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend          # 핫리로드용 소스 마운트
      - ./api:/app/api
      - sqlite_data:/app/data           # SQLite 파일 영속화
    environment:
      - DATABASE_URL=sqlite:////app/data/quantscreen.db
      - REDIS_URL=redis://redis:6379
      - UNIVERSE_LIMIT=50               # 개발 시 50개 제한
    depends_on:
      - redis
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Next.js 프론트엔드 ────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    volumes:
      - ./app:/app/app
      - ./components:/app/components
      - ./lib:/app/lib
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
      - NODE_ENV=development
    depends_on:
      - backend
    command: npm run dev

  # ── Redis (선택, 없으면 인메모리 캐시 사용) ─────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru

volumes:
  sqlite_data:

# 사용법:
#   docker compose up          # 전체 실행
#   docker compose up backend  # 백엔드만 실행
#   docker compose down -v     # 정리 (볼륨 포함)
